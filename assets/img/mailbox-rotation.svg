<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="'Inter',system-ui,'Segoe UI',sans-serif">
  <defs>
    <marker id="rah" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L8 4.5 L0 9 z" fill="#3b82f6"/></marker>
    <style>.mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;}.t1{fill:#eef2f8;}.t2{fill:#9aa6bd;}.t3{fill:#6b7591;}</style>
  </defs>
  <rect x="0" y="0" width="1000" height="360" rx="16" fill="#131826"/>

  <!-- campaign node -->
  <rect x="48" y="138" width="190" height="84" rx="12" fill="#131826" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="143" y="172" fill="#3b82f6" class="mono" font-size="11" font-weight="700" letter-spacing="1" text-anchor="middle">CAMPAIGN</text>
  <text x="143" y="194" class="t2" font-size="12.5" text-anchor="middle">640 contacts queued</text>

  <!-- arrows fanning to 4 mailboxes -->
  <g stroke="#3b82f6" stroke-width="2" fill="none">
    <path d="M238,164 C320,120 360,86 440,86" marker-end="url(#rah)"/>
    <path d="M238,176 C320,150 360,142 440,150" marker-end="url(#rah)"/>
    <path d="M238,184 C320,210 360,222 440,214" marker-end="url(#rah)"/>
    <path d="M238,196 C320,250 360,282 440,278" marker-end="url(#rah)"/>
  </g>

  <!-- mailbox nodes -->
  <g>
    <g>
      <rect x="440" y="64" width="300" height="46" rx="9" fill="#0f1525" stroke="#252f44"/>
      <circle cx="466" cy="87" r="9" fill="#10b98122" stroke="#10b981"/><text x="466" y="91" fill="#10b981" font-size="11" text-anchor="middle">@</text>
      <text x="486" y="83" class="t1" font-size="12.5">sales@yourco.com</text>
      <text x="486" y="100" class="t3 mono" font-size="10">user mailbox · window 9am-12pm</text>
      <text x="726" y="91" class="t2 mono" font-size="11" text-anchor="end">160</text>
    </g>
    <g>
      <rect x="440" y="128" width="300" height="46" rx="9" fill="#0f1525" stroke="#252f44"/>
      <circle cx="466" cy="151" r="9" fill="#10b98122" stroke="#10b981"/><text x="466" y="155" fill="#10b981" font-size="11" text-anchor="middle">@</text>
      <text x="486" y="147" class="t1" font-size="12.5">hello@yourco.com</text>
      <text x="486" y="164" class="t3 mono" font-size="10">shared mailbox · free in M365</text>
      <text x="726" y="155" class="t2 mono" font-size="11" text-anchor="end">160</text>
    </g>
    <g>
      <rect x="440" y="192" width="300" height="46" rx="9" fill="#0f1525" stroke="#252f44"/>
      <circle cx="466" cy="215" r="9" fill="#10b98122" stroke="#10b981"/><text x="466" y="219" fill="#10b981" font-size="11" text-anchor="middle">@</text>
      <text x="486" y="211" class="t1" font-size="12.5">team@yourco.com</text>
      <text x="486" y="228" class="t3 mono" font-size="10">shared mailbox · window 1pm-4pm</text>
      <text x="726" y="219" class="t2 mono" font-size="11" text-anchor="end">160</text>
    </g>
    <g>
      <rect x="440" y="256" width="300" height="46" rx="9" fill="#0f1525" stroke="#252f44"/>
      <circle cx="466" cy="279" r="9" fill="#10b98122" stroke="#10b981"/><text x="466" y="283" fill="#10b981" font-size="11" text-anchor="middle">@</text>
      <text x="486" y="275" class="t1" font-size="12.5">founder@yourco.com</text>
      <text x="486" y="292" class="t3 mono" font-size="10">user mailbox · window 2pm-5pm</text>
      <text x="726" y="283" class="t2 mono" font-size="11" text-anchor="end">160</text>
    </g>
  </g>

  <!-- right note -->
  <text x="790" y="150" class="t1" font-size="14" font-weight="700">Rotates automatically</text>
  <text x="790" y="172" class="t2" font-size="12">Detects your user and shared</text>
  <text x="790" y="189" class="t2" font-size="12">mailboxes and spreads the send</text>
  <text x="790" y="206" class="t2" font-size="12">across them, each within its own</text>
  <text x="790" y="223" class="t2" font-size="12">daily window. Shared mailboxes</text>
  <text x="790" y="240" class="t2" font-size="12">are free in Microsoft 365.</text>
</svg>
