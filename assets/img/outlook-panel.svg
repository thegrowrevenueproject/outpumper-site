<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 700" font-family="'Inter',system-ui,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="pbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <style>
      .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;}
      .t1{fill:#eef2f8;} .t2{fill:#9aa6bd;} .t3{fill:#6b7591;}
      .acc{fill:#3b82f6;} .grn{fill:#10b981;} .amb{fill:#f59e0b;} .red{fill:#ef4444;}
    </style>
  </defs>

  <!-- panel -->
  <rect x="8" y="8" width="544" height="684" rx="16" fill="#0f1525" stroke="#2f3b54"/>
  <!-- header -->
  <text x="34" y="50" class="t1" font-size="19" font-weight="800">Outpumper</text>
  <circle cx="498" cy="44" r="3.5" fill="#6b7591"/><circle cx="512" cy="44" r="3.5" fill="#6b7591"/><circle cx="526" cy="44" r="3.5" fill="#6b7591"/>

  <!-- tabs -->
  <g class="mono" font-size="12.5">
    <text x="34" y="86" class="t3">Campaign</text>
    <text x="112" y="86" class="t3">Mailboxes</text>
    <text x="196" y="86" class="acc" font-weight="700">Dispatcher</text>
    <text x="282" y="86" class="t3">Verifier</text>
    <text x="350" y="86" class="t3">OneBox</text>
    <text x="418" y="86" class="t3">Logs</text>
  </g>
  <rect x="196" y="94" width="74" height="2.5" rx="1" fill="#3b82f6"/>
  <line x1="34" y1="96" x2="526" y2="96" stroke="#252f44"/>

  <!-- queued campaigns -->
  <text x="34" y="126" class="acc mono" font-size="12" font-weight="700" letter-spacing="1.5">QUEUED CAMPAIGNS</text>
  <rect x="34" y="138" width="492" height="150" rx="8" fill="#131826" stroke="#252f44"/>
  <g class="mono" font-size="11">
    <text x="48" y="160" class="t3">CAMPAIGN</text>
    <text x="300" y="160" class="t3">CONTACTS</text>
    <text x="392" y="160" class="t3">STEPS</text>
    <text x="452" y="160" class="t3">STATUS</text>
  </g>
  <line x1="48" y1="170" x2="512" y2="170" stroke="#252f44"/>
  <g font-size="12.5">
    <text x="48" y="194" class="t1">Q3 Founders</text>
    <text x="312" y="194" class="t2 mono">412</text>
    <text x="404" y="194" class="t2 mono">3</text>
    <rect x="452" y="184" width="58" height="15" rx="7.5" fill="#10b98122"/><text x="481" y="195" class="grn mono" font-size="10" text-anchor="middle">RUNNING</text>

    <text x="48" y="224" class="t1">Renewals Q3</text>
    <text x="312" y="224" class="t2 mono">188</text>
    <text x="404" y="224" class="t2 mono">2</text>
    <rect x="452" y="214" width="58" height="15" rx="7.5" fill="#3b82f622"/><text x="481" y="225" class="acc mono" font-size="10" text-anchor="middle">QUEUED</text>

    <text x="48" y="254" class="t1">Agency Net New</text>
    <text x="312" y="254" class="t2 mono">640</text>
    <text x="404" y="254" class="t2 mono">4</text>
    <rect x="452" y="244" width="58" height="15" rx="7.5" fill="#3b82f622"/><text x="481" y="255" class="acc mono" font-size="10" text-anchor="middle">QUEUED</text>
  </g>

  <!-- dispatcher status -->
  <text x="34" y="318" class="acc mono" font-size="12" font-weight="700" letter-spacing="1.5">DISPATCHER STATUS</text>
  <circle cx="44" cy="342" r="5" class="grn"/>
  <text x="58" y="347" class="grn" font-size="15" font-weight="700">Running</text>
  <g class="mono" font-size="12.5">
    <text x="34" y="380" class="t2">Sent <tspan class="t1" font-weight="700">1,284</tspan></text>
    <text x="180" y="380" class="t2">Failed <tspan class="t1" font-weight="700">3</tspan></text>
    <text x="300" y="380" class="t2">Skipped <tspan class="t1" font-weight="700">11</tspan></text>
    <text x="34" y="402" class="t3" font-size="11">Active campaigns 1 · Mailboxes 4</text>
  </g>

  <!-- progress -->
  <rect x="34" y="416" width="492" height="9" rx="4.5" fill="#1b2230"/>
  <rect x="34" y="416" width="306" height="9" rx="4.5" fill="url(#pbar)"/>
  <text x="526" y="440" class="t3 mono" font-size="10.5" text-anchor="end">62% of today's send window</text>

  <!-- buttons -->
  <g font-size="12.5" font-weight="700" text-anchor="middle">
    <rect x="34" y="456" width="150" height="34" rx="7" fill="#10b981"/><text x="109" y="478" fill="#06231b">START ALL</text>
    <rect x="200" y="456" width="150" height="34" rx="7" fill="#f59e0b"/><text x="275" y="478" fill="#2a1d02">PAUSE</text>
    <rect x="366" y="456" width="160" height="34" rx="7" fill="#ef4444"/><text x="446" y="478" fill="#2a0606">STOP ALL</text>
  </g>

  <!-- log -->
  <text x="34" y="522" class="acc mono" font-size="12" font-weight="700" letter-spacing="1.5">DISPATCHER LOG</text>
  <rect x="34" y="534" width="492" height="138" rx="8" fill="#0a0e1a" stroke="#252f44"/>
  <g class="mono" font-size="11">
    <text x="48" y="558" class="t3">10:42:07</text><text x="120" y="558" class="grn">sent → ceo@acme.io</text>
    <text x="48" y="578" class="t3">10:42:09</text><text x="120" y="578" class="t2">rotate → mailbox 2 of 4</text>
    <text x="48" y="598" class="t3">10:42:14</text><text x="120" y="598" class="grn">sent → ops@northwind.co</text>
    <text x="48" y="618" class="t3">10:42:18</text><text x="120" y="618" class="amb">throttle → pausing 6s</text>
    <text x="48" y="638" class="t3">10:42:25</text><text x="120" y="638" class="grn">sent → founder@lumen.dev</text>
    <text x="48" y="658" class="t3">10:42:31</text><text x="120" y="658" class="acc">reply detected → moved to OneBox</text>
  </g>
</svg>
