<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="'Inter',system-ui,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0.04"/>
    </linearGradient>
    <style>.mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;}.t1{fill:#eef2f8;}.t2{fill:#9aa6bd;}.t3{fill:#6b7591;}</style>
  </defs>
  <rect x="0" y="0" width="1000" height="360" rx="16" fill="#131826"/>

  <!-- axes -->
  <line x1="80" y1="300" x2="940" y2="300" stroke="#2f3b54"/>
  <line x1="80" y1="70" x2="80" y2="300" stroke="#2f3b54"/>

  <!-- cap line -->
  <line x1="80" y1="104" x2="940" y2="104" stroke="#ef4444" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="940" y="96" class="red mono" fill="#ef4444" font-size="11" text-anchor="end">Microsoft daily limit</text>

  <!-- area wave -->
  <path d="M80,300 L80,278 C140,242 182,206 222,190 C272,152 312,150 352,130 C392,118 432,162 472,150 C512,140 552,118 592,136 C632,152 672,120 712,140 C752,152 792,122 832,142 C872,152 905,134 920,152 L920,300 Z" fill="url(#wave)" stroke="#3b82f6" stroke-width="2"/>

  <!-- warm start marker -->
  <circle cx="110" cy="268" r="4" fill="#3b82f6"/>
  <text x="122" y="258" class="t2" font-size="12.5">Gradual warm start</text>
  <text x="122" y="274" class="t3" font-size="11">ramps up at campaign start</text>

  <!-- natural waves label -->
  <text x="500" y="100" class="t1" font-size="13" font-weight="700" text-anchor="middle">Natural sending waves</text>
  <text x="500" y="118" class="t3" font-size="11" text-anchor="middle">speeds up and slows down like a person, not a fire hose</text>

  <!-- auto stop note -->
  <circle cx="905" cy="134" r="4" fill="#10b981"/>
  <text x="897" y="128" class="t2" font-size="12" text-anchor="end">Auto-stops well before the cap</text>

  <!-- x labels -->
  <g class="t3 mono" font-size="10.5" text-anchor="middle">
    <text x="80" y="320">9am</text><text x="296" y="320">11am</text><text x="510" y="320">1pm</text><text x="724" y="320">3pm</text><text x="940" y="320">6pm</text>
  </g>
  <text x="40" y="190" class="t3 mono" font-size="10.5" transform="rotate(-90 40 190)" text-anchor="middle">sends / hour</text>
  <text x="80" y="346" class="t3" font-size="11">Throttling and a built-in safety stop keep every account inside Microsoft's limits, automatically.</text>
</svg>
