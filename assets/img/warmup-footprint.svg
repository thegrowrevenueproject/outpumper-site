<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="'Inter',system-ui,'Segoe UI',sans-serif">
  <style>.mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;}.t1{fill:#eef2f8;}.t2{fill:#9aa6bd;}.t3{fill:#6b7591;}</style>
  <rect x="0" y="0" width="1000" height="420" rx="16" fill="#131826"/>

  <!-- LEFT panel: warmup pool -->
  <rect x="24" y="24" width="600" height="372" rx="12" fill="#0f1525" stroke="#252f44"/>
  <text x="48" y="58" class="t1" font-size="16" font-weight="700">The warmup pool</text>
  <rect x="492" y="40" width="108" height="24" rx="12" fill="#ef444422" stroke="#ef4444"/>
  <text x="546" y="56" fill="#ef4444" class="mono" font-size="11" font-weight="700" text-anchor="middle">FLAGGED</text>

  <!-- mesh links -->
  <g stroke="#ef4444" stroke-opacity="0.4" stroke-width="1.3">
    <line x1="150" y1="150" x2="250" y2="118"/><line x1="250" y1="118" x2="350" y2="168"/>
    <line x1="150" y1="150" x2="200" y2="240"/><line x1="200" y1="240" x2="310" y2="262"/>
    <line x1="350" y1="168" x2="310" y2="262"/><line x1="200" y1="240" x2="130" y2="312"/>
    <line x1="130" y1="312" x2="270" y2="332"/><line x1="270" y1="332" x2="310" y2="262"/>
    <line x1="250" y1="118" x2="200" y2="240"/><line x1="350" y1="168" x2="450" y2="210"/>
    <line x1="450" y1="210" x2="310" y2="262"/><line x1="450" y1="210" x2="270" y2="332"/>
  </g>
  <!-- nodes -->
  <g>
    <g fill="#1b2230" stroke="#ef4444" stroke-width="1.4">
      <circle cx="150" cy="150" r="16"/><circle cx="250" cy="118" r="16"/><circle cx="350" cy="168" r="16"/>
      <circle cx="200" cy="240" r="16"/><circle cx="310" cy="262" r="16"/><circle cx="130" cy="312" r="16"/>
      <circle cx="270" cy="332" r="16"/><circle cx="450" cy="210" r="16"/>
    </g>
    <g fill="#ef4444" font-size="13" text-anchor="middle" font-weight="700">
      <text x="150" y="155">@</text><text x="250" y="123">@</text><text x="350" y="173">@</text>
      <text x="200" y="245">@</text><text x="310" y="267">@</text><text x="130" y="317">@</text>
      <text x="270" y="337">@</text><text x="450" y="215">@</text>
    </g>
  </g>
  <text x="48" y="372" class="t2" font-size="12.5">Hundreds of throwaway mailboxes emailing each other to fake activity.</text>
  <text x="48" y="390" class="t3 mono" font-size="11">Pattern detected by Google · Yahoo · Microsoft</text>

  <!-- RIGHT panel: real mailbox -->
  <rect x="648" y="24" width="328" height="372" rx="12" fill="#0f1525" stroke="#252f44"/>
  <text x="672" y="58" class="t1" font-size="16" font-weight="700">A real M365 mailbox</text>
  <rect x="858" y="40" width="100" height="24" rx="12" fill="#10b98122" stroke="#10b981"/>
  <text x="908" y="56" fill="#10b981" class="mono" font-size="11" font-weight="700" text-anchor="middle">TRUSTED</text>

  <!-- single established node -->
  <circle cx="812" cy="170" r="40" fill="#131826" stroke="#10b981" stroke-width="2"/>
  <g transform="translate(792,156)" fill="none" stroke="#10b981" stroke-width="2.2"><rect x="0" y="2" width="40" height="28" rx="3"/><path d="M1 6 L20 20 L39 6"/></g>
  <!-- arrow down to inbox -->
  <line x1="812" y1="214" x2="812" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#ah2)"/>
  <defs><marker id="ah2" markerWidth="9" markerHeight="9" refX="4.5" refY="7" orient="auto"><path d="M0 0 L9 0 L4.5 8 z" fill="#3b82f6"/></marker></defs>
  <rect x="752" y="286" width="120" height="44" rx="8" fill="#1b2230" stroke="#252f44"/>
  <text x="812" y="313" fill="#10b981" font-size="13" font-weight="700" text-anchor="middle">Inbox</text>

  <text x="672" y="372" class="t2" font-size="12.5">One mailbox you already own.</text>
  <text x="672" y="390" class="t3 mono" font-size="11">Real history, real reputation, nothing to fake</text>
</svg>
